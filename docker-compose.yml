# Local development database for Sapphire Vibes.
# Usage:  docker compose up -d   (then: npm run db:migrate && npm run db:seed)
services:
  postgres:
    image: postgres:16-alpine
    container_name: sapphire-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sapphire
    ports:
      - "5432:5432"
    volumes:
      - sapphire_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sapphire"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sapphire_pgdata:
